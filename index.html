<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home IoT Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div>
                <h1>SmartHome</h1>
                <p class="subtitle">Welcome back, Subhalakshmi</p>

            </div>
            <div class="system-status">● System Operational</div>
        </header>

        <main class="grid-layout">
            <div class="card">
                <div class="card-info">
                    <span class="icon">💡</span>
                    <h3>Living Room Lights</h3>
                    <p class="status active">Status: Active</p>
                </div>
                <div class="toggle-switch container-active">
                    <div class="circle right"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-info">
                    <span class="icon">🌡️</span>
                    <h3>Smart Thermostat</h3>
                    <p class="status active">Target: 22°C</p>
                </div>
                <div class="toggle-switch container-active">
                    <div class="circle right"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-info">
                    <span class="icon">🔒</span>
                    <h3>Main Door Lock</h3>
                    <p class="status active">Status: Secured</p>
                </div>
                <div class="toggle-switch container-active">
                    <div class="circle right"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-info">
                    <span class="icon">🎵</span>
                    <h3>Smart Audio</h3>
                    <p class="status text-muted">Acoustic Chill</p>
                </div>
                <div class="toggle-switch container-inactive">
                    <div class="circle left"></div>
                </div>
            </div>
        </main>
    </div>
    <script>
        const toggles = document.querySelectorAll('.toggle_switch');
        toggles.forEach(toggle => {
            toggle.addEventListener('click', () => {
                // Toggle the background color class
                toggle.classList.toggle('container-active');
                toggle.classList.toggle('container-inactive');
                
                // Find the status text inside the same card
                const statusText = toggle.parentElement.querySelector('.status');
                
                // Update the text based on the switch position
                if (toggle.classList.contains('container-active')) {
                    if (statusText.textContent.includes('Lights')) {
                        statusText.textContent = 'Status: Active';
                    } else if (statusText.textContent.includes('Target')) {
                        statusText.textContent = 'Target: 22°C';
                    } else {
                        statusText.textContent = 'Status: Secured';
                    }
                } else {
                    statusText.textContent = 'Status: Off';
                }
            });
        });
    </script>
</body>
</body>
</html>
